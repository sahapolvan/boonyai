<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ผังเครือญาติ</title>

<style>
body{
    font-family: sans-serif;
    margin:20px;
}

table{
    border-collapse: collapse;
    width:100%;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:left;
}

th{
    background:#f2f2f2;
}
</style>

</head>
<body>

<h2>ข้อมูลสมาชิก</h2>

<table id="table">
<thead>
<tr>
    <th>ID</th>
    <th>ชื่อ</th>
    <th>พ่อ</th>
    <th>แม่</th>
    <th>คู่สมรส</th>
    <th>เพศ</th>
</tr>
</thead>

<tbody></tbody>
</table>

<script>

fetch("data.csv")
.then(res => res.text())
.then(text => {

    const rows = text.trim().split("\n");
    const tbody = document.querySelector("#table tbody");

    // ข้ามหัวตาราง
    for(let i=1;i<rows.length;i++){

        const cols = rows[i].split(",");

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${cols[0]}</td>
            <td>${cols[1]}</td>
            <td>${cols[2]}</td>
            <td>${cols[3]}</td>
            <td>${cols[4]}</td>
            <td>${cols[5]}</td>
        `;

        tbody.appendChild(tr);
    }

});

</script>

</body>
</html>
