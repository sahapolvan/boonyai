<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
html,body,#network{
    width:100%;
    height:100%;
    margin:0;
}
</style>

</head>
<body>

<div id="network"></div>

<script>

fetch("data.csv")
.then(r=>r.text())
.then(csv=>{

    const rows = csv.trim().split(/\r?\n/);

    rows.shift(); // ข้ามหัวตาราง

    const nodes = [];
    const edges = [];

    const addedSpouse = new Set();

    rows.forEach(row=>{

        const c = row.split(",");

        const id = c[0];
        const name = c[1];
        const father = c[2];
        const mother = c[3];
        const spouses = c[4];
        const gender = c[5];

        nodes.push({
            id:id,
            label:name,
            shape:"box"
        });

        // พ่อ -> ลูก
        if(father){
            edges.push({
                from:father,
                to:id,
                arrows:"to"
            });
        }

        // แม่ -> ลูก
        if(mother){
            edges.push({
                from:mother,
                to:id,
                arrows:"to"
            });
        }

        // คู่สมรสหลายคน
        if(spouses){

            spouses.split("|").forEach(sp=>{

                const key=[id,sp].sort().join("-");

                if(!addedSpouse.has(key)){

                    addedSpouse.add(key);

                    edges.push({
                        from:id,
                        to:sp,
                        dashes:true,
                        color:"red"
                    });

                }

            });

        }

    });

    new vis.Network(
        document.getElementById("network"),
        {
            nodes:new vis.DataSet(nodes),
            edges:new vis.DataSet(edges)
        },
        {
            layout:{
                hierarchical:{
                    enabled:true,
                    direction:"UD",
                    sortMethod:"directed"
                }
            },
            physics:false
        }
    );

});

</script>

</body>
</html>
