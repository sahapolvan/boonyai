<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ผังตระกูลระบบ GoJS</title>
    <!-- ดึงไฟล์ GoJS ตัวหลักผ่าน CDNJS สากล -->
    <script src="https://cloudflare.com"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
        #myDiagramDiv { width: 100%; height: 100vh; background-color: #fafafa; }
    </style>
</head>
<body>

    <!-- กล่องแสดงผลผังเครือญาติแบบเต็มหน้าจอ -->
    <div id="myDiagramDiv"></div>

    <script>
        const $ = go.GraphObject.make;

        // วาดและจัดโครงสร้างตำแหน่งกล่อง
        const myDiagram = $(go.Diagram, "myDiagramDiv", {
            layout: $(go.TreeLayout, { angle: 90, nodeSpacing: 30, layerSpacing: 50 }),
            "undoManager.isEnabled": true
        });

        // ออกแบบความสวยงามของตัวกล่องข้อความ (Node)
        myDiagram.nodeTemplate =
            $(go.Node, "Auto",
                $(go.Shape, "RoundedRectangle", 
                    { fill: "#ffffff", stroke: "#4a5568", strokeWidth: 2 },
                    new go.Binding("fill", "gender", g => g === "ช" ? "#ebf8ff" : "#fff5f5"), // ชายกล่องสีฟ้า หญิงสีชมพูอ่อน
                    new go.Binding("stroke", "gender", g => g === "ช" ? "#3182ce" : "#e53e3e")
                ),
                $(go.TextBlock, { margin: 15, stroke: "#2d3748", font: "bold 15px Tahoma, Arial" },
                    new go.Binding("text", "name")
                )
            );

        // ออกแบบลักษณะของเส้นเชื่อมโยง (Link) ให้เป็นมุมฉากอัตโนมัติ
        myDiagram.linkTemplate =
            $(go.Link, { routing: go.Routing.Orthogonal, corner: 10 },
                $(go.Shape, { strokeWidth: 3, stroke: "#718096" })
            );

        // ข้อมูลเครือญาติ ดึงสายสัมพันธ์ผ่านตัวแปร parent
        const nodeDataArray = [
            { key: 1, name: "เภา (ปู่ทวด)", gender: "ช" },
            { key: 2, name: "สวัสดิ์ (ย่าทวด)", gender: "ญ" },
            { key: 3, name: "คำเบ้า (ลูก)", gender: "ญ", parent: 1 },
            { key: 4, name: "เดช (เขย)", gender: "ช" },
            { key: 12, name: "แม้ว (หลานชาย)", gender: "ช", parent: 3 },
            { key: 13, name: "ขวัญ (หลานสาว)", gender: "ญ", parent: 3 }
        ];

        myDiagram.model = new go.TreeModel(nodeDataArray);
    </script>
</body>
</html>
