<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ผังตระกูล FamilyTree JS</title>
  <!-- ดึง FamilyTree JS มาใช้งาน -->
  <script src="https://balkan.app"></script>
</head>
<body>

  <!-- กล่องสำหรับแสดงผลผังเครือญาติ -->
  <div id="tree" style="width:100%; height:600px;"></div>

  <script>
    // สั่งวาดเส้นและจัดเลย์เอาต์อัตโนมัติจากข้อมูล JSON
    var family = new FamilyTree(document.getElementById("tree"), {
        mouseScroller: FamilyTree.action.zoom, // ใช้เมาส์สกรอลเพื่อซูมเข้าออกได้
        nodeBinding: {
            field_0: "name" // ดึงข้อมูลจากฟิลด์ name มาโชว์ในกล่อง
        }
    });

    // โครงสร้างข้อมูลแบบแบน (Flat JSON) ที่ตรงกับคอลัมน์ใน CSV ของคุณเป๊ะๆ
    family.load([
        { id: 1, pids:, name: "เภา", gender: "male" },
        { id: 2, pids:, name: "สวัสดิ์", gender: "female" },
        
        // ลูกของ 1 และ 2 (แต่งงานกับ 4)
        { id: 3, fid: 1, mid: 2, pids:, name: "คำเบ้า", gender: "female" }, 
        { id: 4, pids:, name: "เดช", gender: "male" },
        
        // หลาน (ลูกของ 4 และ 3)
        { id: 12, fid: 4, mid: 3, name: "แม้ว", gender: "male" },
        { id: 13, fid: 4, mid: 3, name: "ขวัญ", gender: "female" }
    ]);
  </script>
</body>
</html>
