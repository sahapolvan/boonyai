<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>แผนผังครอบครัวอัตโนมัติ</title>
  <!-- โหลดไลบรารี GoJS สำเร็จรูปสำหรับจัดการกราฟและเส้นโยง -->
  <script src="https://unpkg.com"></script>
</head>
<body>

  <!-- ส่วนแสดงผลแผนผัง กำหนดขนาดความกว้าง-สูง ตรงนี้ได้ -->
  <div id="myDiagramDiv" style="width:100%; height:800px; border:1px solid #ccc; background-color: #f8f9fa;"></div>

  <script>
    // 1. นำข้อมูลจาก Database/Google Sheets ของคุณมาใส่ในรูปแบบ Array
    const rawData = [
      {id:1, name:"เภา", father:"", mother:"", spouse:"2", gender:"ช"},
      {id:2, name:"สวัสดิ์", father:"", mother:"", spouse:"1", gender:"ญ"},
      {id:3, name:"คำเบ้า", father:"1", mother:"2", spouse:"4", gender:"ญ"},
      {id:4, name:"เดช", father:"", mother:"", spouse:"3", gender:"ช"},
      {id:5, name:"เชย", father:"1", mother:"2", spouse:"6", gender:"ช"},
      {id:6, name:"นวล", father:"", mother:"", spouse:"5", gender:"ญ"},
      {id:7, name:"เหมย", father:"1", mother:"2", spouse:"8", gender:"ช"},
      {id:8, name:"โอ๊ะ", father:"", mother:"", spouse:"7", gender:"ญ"},
      {id:9, name:"เกย", father:"1", mother:"2", spouse:"10", gender:"ญ"},
      {id:10, name:"บุญช้อน", father:"", mother:"", spouse:"9", gender:"ช"},
      {id:11, name:"แอ้", father:"1", mother:"2", spouse:"", gender:"ช"},
      {id:12, name:"แม้ว", father:"4", mother:"3", spouse:"20|25|26", gender:"ช"},
      {id:13, name:"ขวัญ", father:"4", mother:"3", spouse:"21", gender:"ญ"},
      {id:14, name:"ตี๋", father:"5", mother:"6", spouse:"32|33|34", gender:"ช"},
      {id:15, name:"ตู่", father:"5", mother:"6", spouse:"22", gender:"ช"},
      {id:16, name:"ปุ๋ย", father:"7", mother:"8", spouse:"23", gender:"ญ"},
      {id:17, name:"ป๊อบ", father:"7", mother:"8", spouse:"24", gender:"ญ"},
      {id:18, name:"ทัด", father:"10", mother:"9", spouse:"", gender:"ช"},
      {id:19, name:"แวน", father:"10", mother:"9", spouse:"", gender:"ช"},
      {id:20, name:"น้อล", father:"", mother:"", spouse:"12", gender:"ญ"},
      {id:21, name:"ตอง", father:"", mother:"", spouse:"13", gender:"ช"},
      {id:22, name:"นุ้ย", father:"", mother:"", spouse:"15", gender:"ญ"},
      {id:23, name:"แซม", father:"", mother:"", spouse:"16", gender:"ช"},
      {id:24, name:"สมชาย", father:"", mother:"", spouse:"17", gender:"ช"},
      {id:25, name:"ดาว", father:"", mother:"", spouse:"12", gender:"ญ"},
      {id:26, name:"เบนซ์", father:"", mother:"", spouse:"12", gender:"ช"}, // ปรับให้สัมพันธ์กับเพศในรูป
      {id:27, name:"เอ", father:"12", mother:"20", spouse:"", gender:"ญ"},
      {id:28, name:"อิ๋ง", father:"12", mother:"20", spouse:"", gender:"ญ"},
      {id:29, name:"โตนนท์", father:"21", mother:"13", spouse:"", gender:"ช"},
      {id:30, name:"โมน่า", father:"21", mother:"13", spouse:"", gender:"ญ"},
      {id:31, name:"อะตอม", father:"15", mother:"22", spouse:"", gender:"ญ"},
      {id:32, name:"โค้ง", father:"", mother:"", spouse:"14", gender:"ช"},
      {id:33, name:"ต้อง", father:"", mother:"", spouse:"14", gender:"ช"},
      {id:34, name:"ตั้ม", father:"", mother:"", spouse:"14", gender:"ช"},
      {id:35, name:"บี", father:"12", mother:"25", spouse:"", gender:"ญ"},
      {id:36, name:"ซี", father:"12", mother:"26", spouse:"", gender:"ช"},
      {id:37, name:"แป้ง", father:"23", mother:"16", spouse:"", gender:"ญ"},
      {id:38, name:"ป๋อง", father:"23", mother:"16", spouse:"", gender:"ช"},
      {id:39, name:"ภูผา", father:"24", mother:"17", spouse:"", gender:"ช"},
      {id:40, name:"ภูเขา", father:"24", mother:"17", spouse:"", gender:"ญ"}
    ];

    // 2. ฟังก์ชันเตรียมสร้างแผนผังตารางโครงสร้าง GoJS
    const $ = go.GraphObject.make;
    const myDiagram = $(go.Diagram, "myDiagramDiv", {
      // ตั้งค่า Layout ให้ลากเส้นจัดกลุ่มแบบ Tree จากบนลงล่าง
      layout: $(go.TreeLayout, { angle: 90, layerSpacing: 35, alternateAngle: 90 }),
      "undoManager.isEnabled": true
    });

    // 3. กำหนดหน้าตาของกล่องข้อความ (Node Template) แยกสี ชาย/หญิง
    myDiagram.nodeTemplate =
      $(go.Node, "Auto",
        $(go.Shape, "RoundedRectangle", { strokeWidth: 1, fill: "white" },
          // เปลี่ยนสีพื้นหลังกล่องตามเพศ: ช = สีฟ้าอ่อน, ญ = สีชมพูอ่อน
          new go.Binding("fill", "gender", g => g === "ช" ? "#d1ecf1" : "#f8d7da"),
          new go.Binding("stroke", "gender", g => g === "ช" ? "#bbeeeb" : "#f5c6cb")
        ),
        $(go.TextBlock, { margin: 8, font: "bold 14px Tahoma, sans-serif" },
          new go.Binding("text", "name")
        )
      );

    // 4. ฟังก์ชันสำหรับโยงเส้นเชื่อม (Link Template) ให้หักมุมฉาก 90 องศาเหมือนในรูป
    myDiagram.linkTemplate =
      $(go.Link, { routing: go.Link.Orthogonal, corner: 10 }, // Orthogonal = หักมุมฉาก, corner = ความโค้งมนของมุมฉาก
        $(go.Shape, { strokeWidth: 2, stroke: "#6c757d" })   // ความหนาและสีของเส้นโยง
      );

    // 5. แปลงรูปแบบข้อมูลให้เข้ากับโครงสร้างกราฟ (Node & Link Data)
    const nodeDataArray = [];
    const linkDataArray = [];

    rawData.forEach(item => {
      // ใส่ข้อมูลบุคคลเข้าแผนผัง
      nodeDataArray.push({ key: item.id, name: item.name, gender: item.gender });

      // ถ้ามีระบุพ่อ ให้ลากเส้นจากพ่อมาหาตัวเอง
      if (item.father) {
        linkDataArray.push({ from: item.father, to: item.id });
      }
      // ถ้ามีระบุแม่ ให้ลากเส้นจากแม่มาหาตัวเอง
      if (item.mother) {
        linkDataArray.push({ from: item.mother, to: item.id });
      }
      // จัดการเส้นเชื่อมคู่สมรส (Spouse)
      if (item.spouse) {
        const spouses = item.spouse.split('|');
        spouses.forEach(sId => {
          // ป้องกันการลากเส้นซ้ำซ้อน (เช่น 1 โยงไป 2 และ 2 โยงมา 1 ให้โยงแค่เส้นเดียว)
          if (item.id < parseInt(sId)) {
            linkDataArray.push({ from: item.id, to: parseInt(sId) });
          }
        });
      }
    });

    // สั่งให้หน้าจอวาดผลลัพธ์ทันที
    myDiagram.model = new go.GraphLinksModel(nodeDataArray, linkDataArray);
  </script>

</body>
</html>
