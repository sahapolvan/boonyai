<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Complex Family Tree</title>
    <!-- โหลดไลบรารี Vis.js Network -->
    <script type="text/javascript" src="https://unpkg.com"></script>
    <style>
        body { margin: 0; background-color: #f8f9fa; font-family: sans-serif; }
        #family-network {
            width: 100vw;
            height: 100vh;
            border: 1px solid #lightgray;
        }
    </style>
</head>
<body>

<div id="family-network"></div>

<script type="text/javascript">
    // 1. กำหนดรายชื่อคน (Nodes)
    var nodes = new vis.DataSet([
        // รุ่นใหญ่
        { id: 1, label: 'สวัสดิ์', color: '#f8c291' },
        { id: 2, label: 'เก่า', color: '#6a89cc' },

        // เคส: ชายรักชาย (เบนซ์ & แก้ว)
        { id: 3, label: 'เบนซ์ (ชาย)', color: '#6a89cc' },
        { id: 4, label: 'แก้ว (ชาย)', color: '#6a89cc' },
        { id: 5, label: 'ปอน (ลูก)', color: '#f8c291' },

        // เคส: หนึ่งชาย หลายหญิง (เช่น นายเอ มีเมีย 3 คน)
        { id: 6, label: 'สามี (นายเอ)', color: '#6a89cc' },
        { id: 7, label: 'ภรรยาคนที่ 1', color: '#f8c291' },
        { id: 8, label: 'ภรรยาคนที่ 2', color: '#f8c291' },
        { id: 9, label: 'ภรรยาคนที่ 3', color: '#f8c291' },
        
        // ลูกๆ ของแต่ละภรรยา
        { id: 10, label: 'ลูกจากภรรยา 1', color: '#82ccdd' },
        { id: 11, label: 'ลูกจากภรรยา 2', color: '#82ccdd' }
    ]);

    // 2. กำหนดเส้นเชื่อมความสัมพันธ์ (Edges)
    var edges = new vis.DataSet([
        // สวัสดิ์ + เก่า
        { from: 1, to: 2, label: 'แต่งงาน', color: { color: '#b2bec3' }, arrows: { to: { enabled: false } } },

        // คู่รักชายรักชาย (ใช้เส้นทึบสีชมพู/แดง หรือระบุข้อความชัดเจน)
        { from: 3, to: 4, label: 'คู่ชีวิต (LGBTQ+)', color: { color: '#e17055' }, width: 3 },
        // โยงลูกไปยังพ่อทั้งสองคน
        { from: 3, to: 5, label: 'ลูก', arrows: 'to' },
        { from: 4, to: 5, label: 'ลูก', arrows: 'to' },

        // ชายคนเดียว มีภรรยา 3 คน (ลากเส้นแต่งงานแยกไปหาทุกคนได้เลย)
        { from: 6, to: 7, label: 'แต่งงาน 1', color: { color: '#fd79a8' } },
        { from: 6, to: 8, label: 'แต่งงาน 2', color: { color: '#fd79a8' } },
        { from: 6, to: 9, label: 'แต่งงาน 3', color: { color: '#fd79a8' } },

        // เส้นโยงหาลูก โดยระบุให้ชัดเจนว่าเกิดจากแม่คนไหน
        { from: 6, to: 10, arrows: 'to' }, // จากพ่อไปลูก 1
        { from: 7, to: 10, arrows: 'to' }, // จากแม่ 1 ไปลูก 1

        { from: 6, to: 11, arrows: 'to' }, // จากพ่อไปลูก 2
        { from: 8, to: 11, arrows: 'to' }  // จากแม่ 2 ไปลูก 2
    ]);

    // 3. จัดการแสดงผล
    var container = document.getElementById('family-network');
    var data = { nodes: nodes, edges: edges };
    var options = {
        nodes: {
            shape: 'box',
            margin: 10,
            font: { size: 16, color: '#2d3436' },
            borderWidth: 2
        },
        edges: {
            smooth: { type: 'cubicBezier' } // ปรับให้เส้นมีความโค้งมนสวยงาม ไม่ตัดกันมั่ว
        },
        physics: {
            enabled: true,
            barnesHut: { gravitationalConstant: -2000, centralGravity: 0.3, springLength: 150 }
        }
    };
    var network = new vis.Network(container, data, options);
</script>

</body>
</html>
