<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ผังครอบครัวระบบเครือข่ายความสัมพันธ์ (CSV ไฟล์เดียว)</title>
    
    <!-- โหลดไลบรารี Vis.js และ PapaParse -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background-color: #f3f4f6; font-family: sans-serif; }
        #family-network { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        #help-box {
            position: absolute; top: 15px; left: 15px; background: rgba(255, 255, 255, 0.95);
            padding: 15px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            font-size: 13px; z-index: 10; max-width: 300px; line-height: 1.6; border-left: 5px solid #2ecc71;
        }
        .color-dot { display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 5px; }
    </style>
</head>
<body>

    <div id="help-box">
        📊 <b>ผังครอบครัวประมวลผลอัตโนมัติจาก data.csv</b><br>
        • รองรับการมีคู่ครองหลายคน (แยกด้วยเครื่องหมาย <code>|</code>)<br>
        • รองรับความสัมพันธ์เพศเดียวกัน (LGBTQ+)<br>
        <hr style="border: 0; border-top: 1px solid #ddd; margin: 10px 0;">
        <b>🎨 ความหมายสีกล่องและเส้น:</b><br>
        <span class="color-dot" style="background: #adcade;"></span> กล่องสีฟ้า = เพศชาย (ช)<br>
        <span class="color-dot" style="background: #ffbe76;"></span> กล่องสีส้ม = เพศหญิง (ญ)<br>
        <span class="color-dot" style="background: #e74c3c;"></span> เส้นสีแดง = คู่ชีวิต / แต่งงาน<br>
        <span class="color-dot" style="background: #2980b9;"></span> เส้นสีน้ำเงิน + ลูกศร = ชี้ไปหาลูก
    </div>

    <div id="family-network"></div>

<script type="text/javascript">
    // โหลดไฟล์ data.csv และประมวลผล
    Papa.parse('data.csv', {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            var rawData = results.data;
            
            var nodeList = [];
            var edgeList = [];
            
            // เพื่อป้องกันการสร้างเส้นแต่งงานซ้ำซ้อนซ้ายขวา
            var marriagePairs = new Set();

            // ลูปครั้งที่ 1: สร้างกล่องข้อความบุคคล (Nodes)
            rawData.forEach(function(row) {
                // ข้ามแถวที่ไม่มี id หรือ name
                if (!row.id || !row.name) return;

                // กำหนดสีกล่องตามคอลัมน์ gender (ช / ญ)
                let boxColor = '#bdc3c7'; // สีเทาเริ่มต้นกรณีไม่ระบุ
                if (row.gender === 'ช') boxColor = '#adcade';
                if (row.gender === 'ญ') boxColor = '#ffbe76';

                nodeList.push({
                    id: row.id,
                    label: row.name,
                    shape: 'box',
                    color: boxColor
                });
            });

            // ลูปครั้งที่ 2: แกะรหัสสร้างเส้นเชื่อมโยงความสัมพันธ์ (Edges)
            rawData.forEach(function(row) {
                if (!row.id) return;

                // 1. สร้างเส้นโยงไปหาคู่ครอง (spouse)
                if (row.spouse) {
                    // แยก ID คู่ครองด้วยเครื่องหมาย | 
                    var spouses = row.spouse.split('|');
                    spouses.forEach(function(spouseId) {
                        spouseId = spouseId.trim();
                        if (!spouseId) return;

                        // ตรวจสอบรหัสคู่เพื่อไม่ให้ลากเส้นซ้ำ เช่น (1 โยงไป 2) และ (2 โยงไป 1)
                        var pairKey = [row.id, spouseId].sort().join('-');
                        if (!marriagePairs.has(pairKey)) {
                            marriagePairs.add(pairKey);
                            edgeList.push({
                                from: row.id,
                                to: spouseId,
                                color: '#e74c3c', // เส้นสีแดงสำหรับคู่ครอง
                                width: 3,
                                arrows: { to: { enabled: false } } // ไม่มีหัวลูกศร
                            });
                        }
                    });
                }

                // 2. สร้างเส้นโยงจาก พ่อ (father) ไปหาลูก
                if (row.father && row.father.trim() !== '') {
                    edgeList.push({
                        from: row.father.trim(),
                        to: row.id,
                        color: '#2980b9', // เส้นสีน้ำเงินชี้หาลูก
                        width: 1.5,
                        arrows: 'to'
                    });
                }

                // 3. สร้างเส้นโยงจาก แม่ (mother) ไปหาลูก
                if (row.mother && row.mother.trim() !== '') {
                    edgeList.push({
                        from: row.mother.trim(),
                        to: row.id,
                        color: '#2980b9', // เส้นสีน้ำเงินชี้หาลูก
                        width: 1.5,
                        arrows: 'to'
                    });
                }
            });

            // วาดกราฟด้วย Vis.js
            var container = document.getElementById('family-network');
            var data = {
                nodes: new vis.DataSet(nodeList),
                edges: new vis.DataSet(edgeList)
            };
            
            var options = {
                nodes: {
                    margin: 12,
                    font: { size: 15 },
                    borderWidth: 2,
                    shadow: true
                },
                edges: {
                    smooth: { enabled: true, type: 'cubicBezier', roundness: 0.5 }
                },
                physics: {
                    enabled: true,
                    barnesHut: { 
                        gravitationalConstant: -4000, // เพิ่มแรงผลักให้กล่องขยายห่างกันสำหรับคน 40 คน
                        springLength: 180 
                    }
                }
            };

            var network = new vis.Network(container, data, options);
        },
        error: function(error) {
            console.error("เกิดข้อผิดพลาด:", error);
            alert("ไม่สามารถเปิดไฟล์ data.csv ได้");
        }
    });
</script>

</body>
</html>
