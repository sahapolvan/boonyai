<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>แผนผังครอบครัวสำเร็จรูป</title>
  <!-- ใช้ D3.js เวอร์ชันเสถียรสำหรับการวาดเส้นโครงสร้างอิสระ -->
  <script src="https://d3js.org"></script>
  <style>
    body { font-family: 'Tahoma', sans-serif; background-color: #fcfcfc; margin: 0; padding: 20px; }
    .node-box { stroke-width: 1.5px; rx: 6px; ry: 6px; }
    .male { fill: #d1ecf1; stroke: #bee5eb; }
    .female { fill: #f8d7da; stroke: #f5c6cb; }
    .node-text { font-size: 13px; font-weight: bold; fill: #333; text-anchor: middle; }
    .family-link { fill: none; stroke: #8A95A5; stroke-width: 2px; }
  </style>
</head>
<body>

  <h2 style="text-align: center; color: #4A5568;">แผนผังครอบครัวจากฐานข้อมูล</h2>
  <div id="canvas" style="display: flex; justify-content: center;"></div>

  <script>
    // 1. ชุดข้อมูลเดิมที่คุณส่งมาทั้งหมดจาก Database
    const dbData = [
      {id:1, name:"เภา", father:"", mother:"", spouse:"2", gender:"ช"},
      {id:2, name:"สวัสดิ์", father:"", mother:"", spouse:"1", gender:"ญ"},
      {id:3, name:"คำเบ้า", father:"1", mother:"2", spouse:"4", gender:"ญ"},
      {id:4, name:"เดช", father:"", mother:"", spouse:"3", gender:"ช"},
      {id:5, name:"เชย", father:"1", mother:"2", spouse:"6", gender:"ช"},
      {id:6, name:"นวล", father:"", mother:"", spouse:"5", gender:"ญ"},
      {id:7, name:"เหมย", father:"1", mother:"2", spouse:"8", gender:"ช"},
      {id:8, name:"โอ๊ะ", father:"", mother:"", spouse:"7", gender:"ญ"},
      {id:9, name:"เกย", father:"1", mother:"2", spouse:"10", gender:"ญ"},
      {id:10, name:"บุญช้อน", father:"", mother:"", spouse:"9", gender:"ช"},
      {id:11, name:"แอ้", father:"1", mother:"2", spouse:"", gender:"ช"},
      {id:12, name:"แม้ว", father:"4", mother:"3", spouse:"20|25|26", gender:"ช"},
      {id:13, name:"ขวัญ", father:"4", mother:"3", spouse:"21", gender:"ญ"},
      {id:14, name:"ตี๋", father:"5", mother:"6", spouse:"32|33|34", gender:"ช"},
      {id:15, name:"ตู่", father:"5", mother:"6", spouse:"22", gender:"ช"},
      {id:16, name:"ปุ๋ย", father:"7", mother:"8", spouse:"23", gender:"ญ"},
      {id:17, name:"ป๊อบ", father:"7", mother:"8", spouse:"24", gender:"ญ"},
      {id:18, name:"ทัด", father:"10", mother:"9", spouse:"", gender:"ช"},
      {id:19, name:"แวน", father:"10", mother:"9", spouse:"", gender:"ช"},
      {id:20, name:"น้อล", father:"", mother:"", spouse:"12", gender:"ญ"},
      {id:21, name:"ตอง", father:"", mother:"", spouse:"13", gender:"ช"},
      {id:22, name:"นุ้ย", father:"", mother:"", spouse:"15", gender:"ญ"},
      {id:23, name:"แซม", father:"", mother:"", spouse:"16", gender:"ช"},
      {id:24, name:"สมชาย", father:"", mother:"", spouse:"17", gender:"ช"},
      {id:25, name:"ดาว", father:"", mother:"", spouse:"12", gender:"ญ"},
      {id:26, name:"เบนซ์", father:"", mother:"", spouse:"12", gender:"ช"},
      {id:27, name:"เอ", father:"12", mother:"20", spouse:"", gender:"ญ"},
      {id:28, name:"อิ๋ง", father:"12", mother:"20", spouse:"", gender:"ญ"},
      {id:29, name:"โตนนท์", father:"21", mother:"13", spouse:"", gender:"ช"},
      {id:30, name:"โมน่า", father:"21", mother:"13", spouse:"", gender:"ญ"},
      {id:31, name:"อะตอม", father:"15", mother:"22", spouse:"", gender:"ญ"},
      {id:32, name:"โค้ง", father:"", mother:"", spouse:"14", gender:"ช"},
      {id:33, name:"ต้อง", father:"", mother:"", spouse:"14", gender:"ช"},
      {id:34, name:"ตั้ม", father:"", mother:"", spouse:"14", gender:"ช"},
      {id:35, name:"บี", father:"12", mother:"25", spouse:"", gender:"ญ"},
      {id:36, name:"ซี", father:"12", mother:"26", spouse:"", gender:"ช"},
      {id:37, name:"แป้ง", father:"23", mother:"16", spouse:"", gender:"ญ"},
      {id:38, name:"ป๋อง", father:"23", mother:"16", spouse:"", gender:"ช"},
      {id:39, name:"ภูผา", father:"24", mother:"17", spouse:"", gender:"ช"},
      {id:40, name:"ภูเขา", father:"24", mother:"17", spouse:"", gender:"ญ"}
    ];

    // 2. ฟังก์ชันจัดโครงสร้างสายเลือดให้ออกมาเป็นลำดับชั้น (Hierarchy ต้นไม้)
    function dataToHierarchy(data) {
      const dataMap = new Map(data.map(item => [item.id, { ...item, children: [] }]));
      let root = null;

      dataMap.forEach(item => {
        // อ้างอิงหา พ่อ หรือ แม่ เพื่อจัดรุ่นลำดับชั้นหลัก
        const parentId = item.father || item.mother;
        if (parentId && dataMap.has(parseInt(parentId))) {
          dataMap.get(parseInt(parentId)).children.push(item);
        } else if (!item.father && !item.mother && (item.id === 1 || item.id === 2)) {
          // กำหนดให้รุ่นสูงสุดคู่แรกเป็นตอหลักของบ้าน
          if (!root) root = item;
        }
      });
      return root;
    }

    const hierarchyData = dataToHierarchy(dbData);

    // 3. กำหนดขนาดพื้นที่วาดผังตระกูล
    const width = 1100, height = 700;
    const boxWidth = 80, boxHeight = 40;

    const svg = d3.select("#canvas").append("svg")
        .attr("width", width)
        .attr("height", height);

    const treemap = d3.tree().size([width - 100, height - 150]);
    const nodes = treemap(d3.hierarchy(hierarchyData));

    // 4. ฟังก์ชันคำนวณลากเส้นต่อเชื่อมความสัมพันธ์หักมุมฉาก 90 องศา (Orthogonal)
    svg.selectAll(".link")
        .data(nodes.descendants().slice(1))
        .enter().append("path")
        .attr("class", "family-link")
        .attr("d", d => {
            // คำนวณพิกัดมุมฉากจากจุด พ่อ/แม่ วิ่งมาหาพิกัด ลูก
            return "M" + (d.parent.x + boxWidth/2) + "," + (d.parent.y + boxHeight)
                 + "V" + (d.parent.y + boxHeight + 20) 
                 + "H" + (d.x + boxWidth/2)
                 + "V" + d.y;
        });

    // 5. สั่งพ่นกล่องรายชื่อตามพิกัดจุด โดยเช็คเพศแยกสี ฟ้า/ชมพู อัตโนมัติ
    const node = svg.selectAll(".node")
        .data(nodes.descendants())
        .enter().append("g")
        .attr("transform", d => "translate(" + d.x + "," + d.y + ")");

    node.append("rect")
        .attr("width", boxWidth)
        .attr("height", boxHeight)
        .attr("class", d => "node-box " + (d.data.gender === "ช" ? "male" : "female"));

    node.append("text")
        .attr("x", boxWidth / 2)
        .attr("y", boxHeight / 2 + 5)
        .attr("class", "node-text")
        .text(d => d.data.name);

  </script>
</body>
</html>
