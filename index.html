<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Echo Simulator - แผนผังครอบครัว</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f9fa;
            color: #333333;
            margin: 0;
            padding: 20px;
        }

        /* ส่วนแสดงผลผังครอบครัวจำลอง */
        .tree-container {
            max-width: 800px;
            margin: 0 auto 30px auto;
            text-align: center;
            padding: 30px;
            background: #ffffff;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
        }

        .tree-title {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* กล่องบุคคลเลียนแบบ Family Echo */
        .member-box {
            display: inline-block;
            width: 160px;
            padding: 12px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 13px;
            text-align: left;
            border: 1px solid #b8c0c8;
            background-color: #f0f4f8; /* สีเริ่มต้น */
            transition: all 0.3s ease;
        }

        /* เปลี่ยนสีตามเพศเหมือนเว็บจริง */
        .member-box.male { background-color: #e3f2fd; border-color: #90caf9; }
        .member-box.female { background-color: #fce4ec; border-color: #f48fb1; }
        .member-box.other { background-color: #f3e5f5; border-color: #ce93d8; }

        .member-name { font-weight: bold; margin-bottom: 4px; color: #1e293b; }
        .member-details { font-size: 11px; color: #64748b; margin-bottom: 6px; }
        .btn-edit-node {
            display: block;
            text-align: center;
            font-size: 11px;
            color: #3498db;
            text-decoration: none;
            border-top: 1px solid #e2e8f0;
            padding-top: 4px;
            cursor: pointer;
        }

        /* หน้าต่างกรอกข้อมูล (Modal) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border: 1px solid #e1e4e6;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 8px;
            margin-top: 0;
            font-size: 20px;
        }

        .tabs {
            display: flex;
            background-color: #f0f3f5;
            padding: 5px 5px 0 5px;
            border-radius: 6px 6px 0 0;
            border-bottom: 1px solid #ccc;
            margin-bottom: 20px;
        }

        .tab {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: bold;
            color: #555;
            background: none;
            border: none;
            cursor: pointer;
        }

        .tab.active {
            background-color: #ffffff;
            color: #3498db;
            border: 1px solid #ccc;
            border-bottom: 1px solid #fff;
            border-radius: 4px 4px 0 0;
            margin-bottom: -1px;
        }

        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .form-group label {
            width: 140px;
            font-size: 13px;
            font-weight: bold;
            color: #4a5568;
        }

        .form-group input, .form-group select, .form-group textarea {
            flex: 1;
            padding: 6px 10px;
            font-size: 13px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
        }

        .button-group {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
            text-align: right;
        }

        .btn {
            padding: 8px 20px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            margin-left: 8px;
        }

        .btn-primary { background-color: #27ae60; color: white; }
        .btn-primary:hover { background-color: #219653; }
        .btn-secondary { background-color: #e2e8f0; color: #4a5568; }
    </style>
</head>
<body>

<!-- 1. ส่วนแสดงต้นไม้ครอบครัวจำลองบนหน้าหลัก -->
<div class="tree-container">
    <div class="tree-title">Interactive Family Tree View</div>
    
    <div id="family-member" class="member-box">
        <div id="display-name" class="member-name">(ยังไม่ได้กำหนดชื่อ)</div>
        <div id="display-details" class="member-details">กรุณากรอกข้อมูล</div>
        <span class="btn-edit-node" onclick="openModal()">Edit details</span>
    </div>
</div>

<!-- 2. หน้าต่างฟอร์มกรอกข้อมูล (เปิด/ปิด ได้ด้วย JavaScript) -->
<div id="form-modal" class="modal-overlay">
    <div class="container">
        <h2>Edit details (Family Echo Sim)</h2>
        
        <div class="tabs">
            <button class="tab active">Personal</button>
            <button class="tab">Partners</button>
            <button class="tab">Contact</button>
            <button class="tab">Biography</button>
        </div>

        <form id="info-form">
            <div class="form-group">
                <label for="given-name">Given names:</label>
                <input type="text" id="given-name" required placeholder="ชื่อจริง ตัวอย่าง: สมชาย">
            </div>

            <div class="form-group">
                <label for="surname-now">Surname now:</label>
                <input type="text" id="surname-now" required placeholder="นามสกุล">
            </div>

            <div class="form-group">
                <label for="gender">Gender:</label>
                <select id="gender" required>
                    <option value="">-- เลือกเพศ --</option>
                    <option value="male">Male (สีฟ้า)</option>
                    <option value="female">Female (สีชมพู)</option>
                    <option value="other">Other (สีม่วง)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="birth-date">Birth date:</label>
                <input type="text" id="birth-date" placeholder="เช่น 1995">
            </div>

            <div class="form-group">
                <label for="profession">Profession:</label>
                <input type="text" id="profession" placeholder="อาชีพปัจจุบัน">
            </div>

            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">OK</button>
            </div>
        </form>
    </div>
</div>

<script>
    const modal = document.getElementById('form-modal');
    const form = document.getElementById('info-form');
    
    // ฟังก์ชันเปิด-ปิด หน้าต่างฟอร์ม
    function openModal() { modal.style.display = 'flex'; }
    function closeModal() { modal.style.display = 'none'; }

    // ทำงานเมื่อกดปุ่ม OK (Submit ฟอร์ม)
    form.addEventListener('submit', function(event) {
        event.preventDefault(); // หยุดการโหลดหน้าใหม่

        // 1. ดึงค่าจากฟอร์ม
        const givenName = document.getElementById('given-name').value;
        const surnameNow = document.getElementById('surname-now').value;
        const gender = document.getElementById('gender').value;
        const birthDate = document.getElementById('birth-date').value || '-';
        const profession = document.getElementById('profession').value || '-';

        // 2. นำข้อมูลไปแสดงที่การ์ดต้นไม้ด้านหลัง
        document.getElementById('display-name').innerText = givenName + " " + surnameNow;
        document.getElementById('display-details').innerHTML = `เกิด: ${birthDate}<br>อาชีพ: ${profession}`;

        // 3. เปลี่ยนสีกล่องตามเพศที่เลือก
        const memberBox = document.getElementById('family-member');
        memberBox.className = 'member-box ' + gender; // ล้างคลาสเก่าแล้วใส่คลาสเพศใหม่

        // 4. ปิดหน้าต่างฟอร์มกรอกข้อมูลลงไป
        closeModal();
    });
</script>

</body>
</html>
