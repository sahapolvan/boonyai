<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Google Sheets + Family Tree Open Source</title>
    <!-- เรียกใช้งานชุดคำสั่ง D3 และ Family Chart ฟรี 100% -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/dist/styles.css">
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #fafafa; }
        #FamilyChart { width: 100vw; height: 100vh; }
        .fchart-node-box { rx: 6px; ry: 6px; }
        .fchart-gender-F .fchart-node-box { fill: #ffe3e3; stroke: #ffb6b6; } /* สีกล่องผู้หญิง */
        .fchart-gender-M .fchart-node-box { fill: #e3f2fd; stroke: #90caf9; } /* สีกล่องผู้ชาย */
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; }
    </style>
</head>
<body>

    <div id="loading">กำลังดึงข้อมูลความสัมพันธ์จาก Google Sheets...</div>
    <div id="FamilyChart"></div>

    <script>
        // 1. ระบุลิงก์ CSV จาก Google Sheets ของคุณ
        const googleSheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQssm9nAkj3WvQOXzfNyYwoaRo1q1OotMaKOV5Ij8HvEsSkIb9WmJMDskcADXcrtOtL9DOdqQLuJa1r/pub?output=csv";

        // 2. ใช้ฟังก์ชัน d3.csv ในการไปดาวน์โหลดและแปลงไฟล์จากลิงก์ของคุณ
        d3.csv(googleSheetCsvUrl).then(function(rawData) {
            
            // ซ่อนข้อความโหลดข้อมูลเมื่อทำสำเร็จ
            document.getElementById("loading").style.display = "none";

            // 3. วนลูปจัดรูปแบบตาราง (Format Data) ให้เข้าล็อกของโครงสร้าง Family Chart
            const familyData = rawData.map(row => {
                let node = {
                    id: row.id.trim(),
                    name: row.name.trim(),
                    gender: row.gender.trim().toUpperCase(),
                    rels: {}
                };

                // แปลงข้อมูลคู่สมรสกรณีที่มีหลายคน (สเปซคั่นด้วยจุลภาค)
                if (row.spouses) {
                    node.rels.spouses = row.spouses.split(',').map(s => s.trim());
                }
                // ใส่รหัสพ่อ
                if (row.father) {
                    node.rels.father = row.father.trim();
                }
                // ใส่รหัสแม่
                if (row.mother) {
                    node.rels.mother = row.mother.trim();
                }

                return node;
            });

            // 4. สั่งสั่งรันวาดแผนผังลงบนหน้าจอ
            const fchart = fmlChart()
                .target("#FamilyChart")
                .data(familyData)
                .view("tree")
                .create();

        }).catch(function(error) {
            document.getElementById("loading").innerText = "เกิดข้อผิดพลาดในการโหลดข้อมูล: " + error.message;
            console.error(error);
        });
    </script>
</body>
</html>
