<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Echo Simulator - ระบบเพิ่มสายสัมพันธ์</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f9fa;
            color: #333333;
            margin: 0;
            padding: 20px;
        }

        /* จัดหน้าตาแผนผังครอบครัว */
        .tree-container {
            max-width: 900px;
            margin: 0 auto 30px auto;
            padding: 40px 20px;
            background: #ffffff;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* โครงสร้างแถวของพ่อแม่และลูก */
        .parents-row {
            display: flex;
            gap: 60px;
            margin-bottom: 40px;
            position: relative;
        }

        /* เส้นเชื่อมความสัมพันธ์ (CSS แบบง่าย) */
        .parents-row::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            width: 2px;
            height: 20px;
            background-color: #b8c0c8;
            display: none; /* เปิดเมื่อมีพ่อหรือแม่ */
        }
        .parents-row.has-parents::after {
            display: block;
        }

        /* กล่องบุคคลเลียนแบบ Family Echo */
        .member-box {
            width: 160px;
            padding: 12px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 13px;
            text-align: left;
            border: 1px solid #b8c0c8;
            background-color: #f0f4f8;
            position: relative;
        }

        /* ปุ่มเพิ่มพ่อ/แม่แบบด่วนด้านบนกล่องลูก */
        .add-parent-buttons {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .btn-add-p {
            font-size: 10px;
            padding: 2px 6px;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-add-p:hover { background-color: #2c3e50; }

        /* เปลี่ยนสีตามเพศ */
        .member-box.male { background-color: #e3f2fd; border-color: #90caf9; }
        .member-box.female { background-color: #fce4ec; border-color: #f48fb1; }
        .member-box.other { background-color: #f3e5f5; border-color: #ce93d8; }

        .member-name { font-weight: bold; margin-bottom: 4px; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .member-details { font-size: 11px; color: #64748b; margin-bottom: 6px; }
        
        .btn-edit-node {
            display: block;
            text-align: center;
            font-size: 11px;
            color: #3498db;
            text-decoration: none;
            border-top: 1px solid #e2e8f0;
            padding-top: 4px;
            cursor: pointer;
        }

        /* หน้าต่างฟอร์มกรอกข้อมูล (Modal) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border: 1px solid #e1e4e6;
        }

        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 8px; margin-top: 0; font-size: 18px; }
        .form-group { display: flex; align-items: center; margin-bottom: 12px; }
        .form-group label { width: 120px; font-size: 13px; font-weight: bold; color: #4a5568; }
        .form-group input, .form-group select { flex: 1; padding: 6px 10px; font-size: 13px; border: 1px solid #cbd5e1; border-radius: 4px; }
        .button-group { margin-top: 25px; padding-top: 15px; border-top: 1px solid #e2e8f0; text-align: right; }
        .btn { padding: 8px 20px; font-size: 13px; font-weight: bold; border-radius: 4px; cursor: pointer; border: none; margin-left: 8px; }
        .btn-primary { background-color: #27ae60; color: white; }
        .btn-secondary { background-color: #e2e8f0; color: #4a5568; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="tree-container">
    <!-- แถวสำหรับแสดงพ่อและแม่ -->
    <div id="parents-zone" class="parents-row">
        <!-- กล่องพ่อ (ซ่อนไว้เริ่มต้น) -->
        <div id="father-box" class="member-box male hidden">
            <div id="father-name" class="member-name">Father Name</div>
            <div id="father-details" class="member-details">เกิด: -</div>
            <span class="btn-edit-node" onclick="openModal('father')">Edit</span>
        </div>
        
        <!-- กล่องแม่ (ซ่อนไว้เริ่มต้น) -->
        <div id="mother-box" class="member-box female hidden">
            <div id="mother-name" class="member-name">Mother Name</div>
            <div id="mother-details" class="member-details">เกิด: -</div>
            <span class="btn-edit-node" onclick="openModal('mother')">Edit</span>
        </div>
    </div>

    <!-- กล่องลูก (ตัวหลัก) -->
    <div id="child-box" class="member-box">
        <div class="add-parent-buttons">
            <button id="add-father-btn" class="btn-add-p" onclick="openModal('father')">+ Add Father</button>
            <button id="add-mother-btn" class="btn-add-p" onclick="openModal('mother')">+ Add Mother</button>
        </div>
        <div id="child-name" class="member-name">คุณ (ตัวคุณเอง)</div>
        <div id="child-details" class="member-details">เกิด: -</div>
        <span class="btn-edit-node" onclick="openModal('child')">Edit details</span>
    </div>
</div>

<!-- หน้าต่างกรอกข้อมูล -->
<div id="form-modal" class="modal-overlay">
    <div class="container">
        <h2 id="modal-title">Edit details</h2>
        <form id="info-form">
            <input type="hidden" id="target-member"> <!-- ระบุว่ากำลังแก้กล่องไหน -->
            
            <div class="form-group">
                <label for="given-name">Given name:</label>
                <input type="text" id="given-name" required placeholder="ชื่อจริง">
            </div>

            <div class="form-group">
                <label for="surname">Surname:</label>
                <input type="text" id="surname" required placeholder="นามสกุล">
            </div>

            <div class="form-group">
                <label for="gender">Gender:</label>
                <select id="gender" required>
                    <option value="male">Male (สีฟ้า)</option>
                    <option value="female">Female (สีชมพู)</option>
                    <option value="other">Other (สีม่วง)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="birth-date">Birth date:</label>
                <input type="text" id="birth-date" placeholder="เช่น 1995">
            </div>

            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">OK</button>
            </div>
        </form>
    </div>
</div>

<script>
    const modal = document.getElementById('form-modal');
    const form = document.getElementById('info-form');
    
    // เปิดหน้าต่างกรอกข้อมูล และตั้งค่าเริ่มต้นตามกล่องที่เลือก
    function openModal(role) {
        document.getElementById('target-member').value = role;
        
        if (role === 'child') {
            document.getElementById('modal-title').innerText = "แก้ไขข้อมูล: ตัวคุณเอง";
            document.getElementById('gender').value = "male";
        } else if (role === 'father') {
            document.getElementById('modal-title').innerText = "เพิ่ม/แก้ไขข้อมูล: พ่อ";
            document.getElementById('gender').value = "male";
        } else if (role === 'mother') {
            document.getElementById('modal-title').innerText = "เพิ่ม/แก้ไขข้อมูล: แม่";
            document.getElementById('gender').value = "female";
        }
        
        modal.style.display = 'flex';
    }

    function closeModal() { modal.style.display = 'none'; form.reset(); }

    // ทำงานเมื่อกดตกลง (OK)
    form.addEventListener('submit', function(event) {
        event.preventDefault();
        
        const role = document.getElementById('target-member').value;
        const name = document.getElementById('given-name').value + " " + document.getElementById('surname').value;
        const gender = document.getElementById('gender').value;
        const birth = document.getElementById('birth-date').value || '-';

        if (role === 'child') {
            document.getElementById('child-name').innerText = name;
            document.getElementById('child-details').innerHTML = `เกิด: ${birth}`;
            document.getElementById('child-box').className = 'member-box ' + gender;
        } 
        else if (role === 'father') {
            // แสดงกล่องพ่อ และซ่อนปุ่มกดเพิ่มเดิม
            document.getElementById('father-box').classList.remove('hidden');
            document.getElementById('add-father-btn').classList.add('hidden');
            
            document.getElementById('father-name').innerText = name;
            document.getElementById('father-details').innerHTML = `เกิด: ${birth}`;
            document.getElementById('father-box').className = 'member-box ' + gender;
            checkLines();
        } 
        else if (role === 'mother') {
            // แสดงกล่องแม่ และซ่อนปุ่มกดเพิ่มเดิม
            document.getElementById('mother-box').classList.remove('hidden');
