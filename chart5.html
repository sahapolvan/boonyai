<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทดสอบดึงข้อความดิบจาก GitHub (Local File)</title>
    <style>
        body { margin: 0; padding: 20px; font-family: monospace; background-color: #272822; color: #f8f8f2; font-size: 14px; line-height: 1.6; }
        .header { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #3e3d32; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .success { background-color: #a6e22e; color: #272822; }
        .error { background-color: #f92672; color: #fff; }
        .pending { background-color: #66d9ef; color: #272822; }
        pre { background-color: #1e1f1c; padding: 15px; border-radius: 6px; border: 1px solid #3e3d32; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🐙 ระบบทดสอบดึงไฟล์ data.csv ภายในโปรเจกต์เดียวกัน</h2>
        <p><b>พิกัดที่ใช้ดึง:</b> <span style="color: #a6e22e;">"data.csv" (ดึงไฟล์ที่อยู่ข้างกันโดยตรง ไม่ข้ามเว็บ)</span></p>
        <p><b>สถานะปัจจุบัน:</b> <span id="status" class="status-badge pending">กำลังเปิดอ่านไฟล์ในโฟลเดอร์...</span></p>
    </div>

    <h3>📄 เนื้อหาข้อความดิบภายในไฟล์ (Raw Data Area):</h3>
    <pre id="output">กำลังเปิดอ่านไฟล์ข้อมูลข้างเคียง โปรดรอสักครู่...</pre>

    <script>
        // เปลี่ยนมาเรียกชื่อไฟล์ตรงๆ ป้องกันการโดนบล็อก Network ข้ามเว็บไซต์
        const urlGitHubTree = "data.csv";

        fetch(urlGitHubTree)
            .then(response => {
                if (!response.ok) {
                    throw new Error("ไม่สามารถเปิดไฟล์ได้ (HTTP " + response.status + ")");
                }
                return response.text();
            })
            .then(textData => {
                // ดึงสำเร็จแน่นอน 100% เพราะไม่ต้องวิ่งออกไปนอกเว็บ
                const statusBadge = document.getElementById("status");
                statusBadge.innerText = "✅ ดึงข้อมูลสำเร็จ!";
                statusBadge.className = "status-badge success";

                document.getElementById("output").style.color = "#a6e22e";
                document.getElementById("output").innerText = textData;
            })
            .catch(err => {
                const statusBadge = document.getElementById("status");
                statusBadge.innerText = "❌ เกิดข้อผิดพลาด";
                statusBadge.className = "status-badge error";

                document.getElementById("output").style.color = "#f92672";
                document.getElementById("output").innerText = `ข้อผิดพลาด: ${err.message}`;
            });
    </script>
</body>
</html>
